
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

.sw-wrap{
  font-family:'Inter',sans-serif;
  background:#0c0c0c;
  color:#e2e2da;
  min-height:580px;
  padding:2rem 1.5rem;
}

.sw-header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:2rem;
}

.sw-logo{
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:17px;
  letter-spacing:-0.5px;
  color:#e2e2da;
}

.sw-day{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:1.5px;
  color:#444;
}

.sw-type-row{
  display:flex;
  gap:8px;
  margin-bottom:1.25rem;
}

.sw-type-btn{
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:0.5px;
  padding:6px 14px;
  border:1px solid #222;
  background:transparent;
  color:#555;
  cursor:pointer;
  border-radius:2px;
  transition:all 0.15s;
}

.sw-type-btn:hover{border-color:#444;color:#aaa}
.sw-type-btn.active{border-color:#e2e2da;color:#e2e2da;background:#161616}

.sw-input{
  width:100%;
  background:#141414;
  border:1px solid #1e1e1e;
  border-radius:2px;
  color:#e2e2da;
  font-family:'Inter',sans-serif;
  font-size:14px;
  line-height:1.6;
  padding:14px 16px;
  resize:vertical;
  min-height:110px;
  outline:none;
  transition:border-color 0.15s;
  margin-bottom:12px;
}

.sw-input:focus{border-color:#2e2e2e}
.sw-input::placeholder{color:#333}

.sw-btn{
  font-family:'Space Mono',monospace;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.5px;
  padding:10px 22px;
  background:#e2e2da;
  color:#0c0c0c;
  border:none;
  border-radius:2px;
  cursor:pointer;
  transition:opacity 0.15s;
}

.sw-btn:hover{opacity:0.85}
.sw-btn:disabled{opacity:0.3;cursor:not-allowed}

.sw-loading{
  display:none;
  align-items:center;
  gap:10px;
  margin-top:1.5rem;
}
.sw-loading.on{display:flex}

.sw-dots{display:flex;gap:5px}
.sw-dot{
  width:5px;height:5px;border-radius:50%;
  background:#333;
  animation:dp 1.2s ease-in-out infinite;
}
.sw-dot:nth-child(2){animation-delay:0.2s}
.sw-dot:nth-child(3){animation-delay:0.4s}

@keyframes dp{
  0%,80%,100%{background:#333}
  40%{background:#aaa}
}

.sw-load-txt{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:#555;
}

.sw-err{
  display:none;
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:#c0392b;
  margin-top:1rem;
}
.sw-err.on{display:block}

.sw-out{display:none;margin-top:2rem}
.sw-out.on{display:block}

.sw-component-name{
  font-family:'Space Mono',monospace;
  font-size:20px;
  font-weight:700;
  color:#e2e2da;
  margin-bottom:4px;
}

.sw-component-desc{
  font-size:13px;
  color:#666;
  margin-bottom:2rem;
  line-height:1.5;
}

.sw-section{
  margin-bottom:1.75rem;
}

.sw-section-label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:2px;
  color:#444;
  text-transform:uppercase;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1px solid #1a1a1a;
}

.sw-table{
  width:100%;
  border-collapse:collapse;
}

.sw-table tr{border-bottom:1px solid #141414}
.sw-table tr:last-child{border-bottom:none}

.sw-table td{
  padding:9px 0;
  font-size:13px;
  vertical-align:top;
}

.sw-table td:first-child{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:#555;
  width:38%;
  padding-right:16px;
  padding-top:10px;
}

.sw-table td:last-child{
  color:#c8c8c0;
  line-height:1.55;
}

.sw-states{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.sw-state{
  background:#141414;
  border:1px solid #1e1e1e;
  border-radius:2px;
  padding:12px 14px;
}

.sw-state-name{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:#666;
  margin-bottom:5px;
}

.sw-state-desc{
  font-size:12px;
  color:#888;
  line-height:1.5;
}

.sw-a11y{
  background:#141414;
  border:1px solid #1e1e1e;
  border-left:3px solid #2ecc71;
  border-radius:0 2px 2px 0;
  padding:14px 16px;
}

.sw-a11y-item{
  font-size:13px;
  color:#888;
  line-height:1.6;
  padding:6px 0;
  border-bottom:1px solid #1a1a1a;
}
.sw-a11y-item:last-child{border:none}

.sw-copy-row{
  display:flex;
  gap:8px;
  margin-top:1.5rem;
}

.sw-copy-btn{
  font-family:'Space Mono',monospace;
  font-size:11px;
  padding:8px 16px;
  border:1px solid #222;
  background:transparent;
  color:#666;
  cursor:pointer;
  border-radius:2px;
  transition:all 0.15s;
}

.sw-copy-btn:hover{border-color:#444;color:#aaa}
.sw-copy-btn.copied{border-color:#2ecc71;color:#2ecc71}
</style>

<div class="sw-wrap">
  <div class="sw-header">
    <span class="sw-logo">Specwriter</span>
    <span class="sw-day">SHIP69 / DAY 56</span>
  </div>

  <div class="sw-type-row">
    <button class="sw-type-btn active" data-t="component" onclick="setType('component')">Component</button>
    <button class="sw-type-btn" data-t="screen" onclick="setType('screen')">Screen</button>
    <button class="sw-type-btn" data-t="pattern" onclick="setType('pattern')">Pattern</button>
  </div>

  <textarea class="sw-input" id="swInput" placeholder="Describe what you're designing. Be specific — what it does, who uses it, what states it has, any colour or type details you know. e.g. 'A primary CTA button, blue, used on a SaaS onboarding flow. Has hover, active, disabled, and loading states.'"></textarea>

  <button class="sw-btn" id="swBtn" onclick="runSpec()">Write spec →</button>

  <div class="sw-loading" id="swLoading">
    <div class="sw-dots">
      <div class="sw-dot"></div><div class="sw-dot"></div><div class="sw-dot"></div>
    </div>
    <span class="sw-load-txt" id="swLoadTxt">Reading the component...</span>
  </div>

  <div class="sw-err" id="swErr"></div>

  <div class="sw-out" id="swOut">
    <div class="sw-component-name" id="swName"></div>
    <div class="sw-component-desc" id="swDesc"></div>

    <div class="sw-section">
      <div class="sw-section-label">Typography</div>
      <table class="sw-table" id="swType"></table>
    </div>

    <div class="sw-section">
      <div class="sw-section-label">Spacing & Layout</div>
      <table class="sw-table" id="swSpacing"></table>
    </div>

    <div class="sw-section">
      <div class="sw-section-label">Colour</div>
      <table class="sw-table" id="swColour"></table>
    </div>

    <div class="sw-section">
      <div class="sw-section-label">Interaction States</div>
      <div class="sw-states" id="swStates"></div>
    </div>

    <div class="sw-section">
      <div class="sw-section-label">Accessibility</div>
      <div class="sw-a11y" id="swA11y"></div>
    </div>

    <div class="sw-copy-row">
      <button class="sw-copy-btn" id="swCopyBtn" onclick="copySpec()">Copy full spec</button>
    </div>
  </div>
</div>

<script>
let currentType = 'component';
let lastSpec = null;

const loadMsgs = [
  'Reading the component...',
  'Mapping the states...',
  'Calculating spacing...',
  'Writing accessibility notes...',
  'Finalising the spec...'
];

function setType(t){
  currentType = t;
  document.querySelectorAll('.sw-type-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  const ph = {
    component: "Describe the component — what it does, its states, any colour/type details. e.g. 'A primary CTA button, blue, SaaS onboarding. Has hover, active, disabled, loading states.'",
    screen: "Describe the screen — its purpose, key sections, primary action, user context. e.g. 'A dashboard home screen for a project management tool. Shows task overview, recent activity, quick-add.'",
    pattern: "Describe the pattern — e.g. 'Empty state for a notifications inbox. Friendly tone, with an illustration placeholder and a CTA to invite teammates.'"
  };
  document.getElementById('swInput').placeholder = ph[t];
}

function tableRows(obj){
  return Object.entries(obj).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
}

async function runSpec(){
  const input = document.getElementById('swInput').value.trim();
  if(!input) return;

  const btn = document.getElementById('swBtn');
  const loading = document.getElementById('swLoading');
  const ltxt = document.getElementById('swLoadTxt');
  const out = document.getElementById('swOut');
  const err = document.getElementById('swErr');

  btn.disabled = true;
  out.classList.remove('on');
  err.classList.remove('on');
  loading.classList.add('on');

  let mi = 0;
  const lt = setInterval(()=>{ mi=(mi+1)%loadMsgs.length; ltxt.textContent=loadMsgs[mi]; }, 1800);

  const typeContext = {
    component: 'a UI component',
    screen: 'a full screen or page',
    pattern: 'a UI pattern or micro-interaction'
  };

  const system = `You are a senior product designer writing a precise handoff spec for ${typeContext[currentType]}. You output ONLY a JSON object, no markdown, no preamble.

Return this exact shape:
{
  "name": "Short component/screen name, e.g. 'Primary Button' or 'Onboarding Dashboard'",
  "description": "One clear sentence on what this is and its purpose in the product.",
  "typography": {
    "Font family": "value",
    "Font size": "value",
    "Font weight": "value",
    "Line height": "value",
    "Letter spacing": "value",
    "Text transform": "value if relevant, else omit"
  },
  "spacing": {
    "Padding (vertical)": "value",
    "Padding (horizontal)": "value",
    "Min width": "value or omit",
    "Min height": "value or omit",
    "Border radius": "value",
    "Gap (if flex)": "value or omit",
    "Max width": "value or omit"
  },
  "colour": {
    "Background": "hex or token",
    "Text": "hex or token",
    "Border": "hex or token or 'none'",
    "Icon": "hex or token or 'inherits'",
    "Focus ring": "hex or token"
  },
  "states": [
    {"name": "Default", "description": "One sentence describing the default visual."},
    {"name": "Hover", "description": "One sentence."},
    {"name": "Active / Pressed", "description": "One sentence."},
    {"name": "Disabled", "description": "One sentence."},
    {"name": "Loading", "description": "One sentence — include if relevant."},
    {"name": "Focus", "description": "One sentence on keyboard focus ring."}
  ],
  "accessibility": [
    "ARIA role and label guidance in one sentence.",
    "Keyboard interaction in one sentence.",
    "Contrast requirement in one sentence.",
    "Any additional WCAG note in one sentence."
  ]
}

Be specific with real values — use px or rem for sizes, real hex codes for colours. If the user hasn't specified, make informed professional decisions and state them clearly. Do not use bullet points in any string value.`;

  try{
    const res = await fetch('/api/spec',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        max_tokens:1200,
        system,
        messages:[{role:'user',content:input}]
      })
    });

    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Request failed');

    const clean = (data.text||'').replace(/```json|```/g,'').trim();
    const p = JSON.parse(clean);
    lastSpec = p;

    clearInterval(lt);
    loading.classList.remove('on');

    document.getElementById('swName').textContent = p.name;
    document.getElementById('swDesc').textContent = p.description;

    document.getElementById('swType').innerHTML = tableRows(p.typography);
    document.getElementById('swSpacing').innerHTML = tableRows(p.spacing);
    document.getElementById('swColour').innerHTML = tableRows(p.colour);

    document.getElementById('swStates').innerHTML = (p.states||[]).map(s=>`
      <div class="sw-state">
        <div class="sw-state-name">${s.name}</div>
        <div class="sw-state-desc">${s.description}</div>
      </div>`).join('');

    document.getElementById('swA11y').innerHTML = (p.accessibility||[]).map(a=>`
      <div class="sw-a11y-item">${a}</div>`).join('');

    out.classList.add('on');
    btn.disabled = false;

  } catch(e){
    clearInterval(lt);
    loading.classList.remove('on');
    document.getElementById('swErr').textContent = e.message || 'Something went wrong. Check your connection and try again.';
    document.getElementById('swErr').classList.add('on');
    btn.disabled = false;
  }
}

function copySpec(){
  if(!lastSpec) return;
  const p = lastSpec;
  let txt = `${p.name}\n${p.description}\n\n`;

  txt += `TYPOGRAPHY\n`;
  Object.entries(p.typography).forEach(([k,v])=>{ txt+=`${k}: ${v}\n`; });

  txt += `\nSPACING & LAYOUT\n`;
  Object.entries(p.spacing).forEach(([k,v])=>{ txt+=`${k}: ${v}\n`; });

  txt += `\nCOLOUR\n`;
  Object.entries(p.colour).forEach(([k,v])=>{ txt+=`${k}: ${v}\n`; });

  txt += `\nINTERACTION STATES\n`;
  (p.states||[]).forEach(s=>{ txt+=`${s.name}: ${s.description}\n`; });

  txt += `\nACCESSIBILITY\n`;
  (p.accessibility||[]).forEach(a=>{ txt+=`${a}\n`; });

  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('swCopyBtn');
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy full spec'; btn.classList.remove('copied'); },2000);
  });
}
</script>
